<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Weekly intelligence report — WatchBack</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b0d; --panel:#0d1318; --panel2:#101a20; --raised:#13212a;
  --line:rgba(120,170,180,.13); --line2:rgba(120,170,180,.26);
  --sage:#57d2cf; --sage-d:#3f9d9b; --sage-soft:rgba(87,210,207,.1);
  --gold:#e3a92c; --clay:#e2554f; --quiet:#62bd7e;
  --text:#cdd6da; --muted:#8a99a2; --faint:#5e6e76;
  --mono:'JetBrains Mono',monospace; --disp:'Oswald',sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; line-height:1.6}
body::before{content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(800px 420px at 80% -10%, rgba(87,210,207,.08), transparent 60%),
  linear-gradient(rgba(120,170,180,.04) 1px, transparent 1px) 0 0/100% 46px,
  linear-gradient(90deg, rgba(120,170,180,.04) 1px, transparent 1px) 0 0/46px 100%}
.wrap{position:relative; z-index:1; max-width:820px; margin:0 auto; padding:0 22px 90px}
a{color:var(--sage); text-decoration:none}
.lbl{font-family:var(--mono); font-size:10.5px; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:var(--sage)}

.top{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:20px 0; border-bottom:1px solid var(--line2); flex-wrap:wrap}
.brand{display:flex; align-items:center; gap:11px; color:inherit}
.crest{width:34px; height:34px; border-radius:50%; border:1px solid var(--sage-d); background:var(--sage-soft); display:flex; align-items:center; justify-content:center}
.crest svg{width:18px; height:18px; transform-origin:center; animation:blink 8.4s ease-in-out infinite}
@keyframes blink{0%,94%,100%{transform:scaleY(1)} 96%{transform:scaleY(.08)} 98%{transform:scaleY(1)}}
@media(prefers-reduced-motion:reduce){.crest svg{animation:none}}
.brand b{font-family:var(--disp); font-weight:600; font-size:17px; color:#e7edef}
.top .tagl{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint)}
.share{font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; padding:9px 15px; border-radius:6px; border:1px solid var(--line2); background:none; color:var(--text); cursor:pointer; transition:.15s}
.share:hover{border-color:var(--sage-d); color:var(--sage)}
.share.ok{color:var(--quiet); border-color:var(--quiet)}

.rep-head{padding:38px 0 24px; border-bottom:1px solid var(--line2)}
.rep-kind{display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--clay); border:1px solid rgba(226,85,79,.4); padding:4px 11px; border-radius:3px; background:rgba(226,85,79,.07)}
.rep-kind .dot{width:5px; height:5px; border-radius:50%; background:var(--clay); box-shadow:0 0 7px var(--clay); animation:dotpulse 1.2s ease-in-out infinite}
@keyframes dotpulse{0%,100%{opacity:1} 50%{opacity:.3}}
h1{font-family:var(--disp); font-weight:600; font-size:clamp(30px,5.4vw,44px); line-height:1.08; color:#eef3f4; margin:16px 0 6px}
.weekline{font-family:var(--mono); font-size:12px; letter-spacing:.05em; color:var(--muted)}
.headline{font-size:clamp(17px,2.6vw,21px); color:var(--text); line-height:1.5; margin:22px 0 0; max-width:56ch}
.headline b{color:var(--sage)}

.statrow{display:flex; gap:12px; flex-wrap:wrap; margin:26px 0 0}
.stat{flex:1; min-width:130px; border:1px solid var(--line2); border-radius:10px; background:var(--panel); padding:14px 16px}
.stat .n{font-family:var(--disp); font-weight:700; font-size:26px; color:var(--sage); line-height:1}
.stat .l{font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); margin-top:6px}

section{padding:34px 0 0}
h2{font-family:var(--disp); font-weight:600; font-size:21px; color:#eaf0f1; margin:10px 0 16px}
.summary{border-left:3px solid var(--sage); background:linear-gradient(180deg,var(--panel2),var(--panel)); border-radius:0 12px 12px 0; padding:22px 24px; font-size:16px; line-height:1.7; color:var(--text)}

.tl{list-style:none; margin:0; padding:0}
.tl li{display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--line); font-size:14.5px; line-height:1.55}
.tl .d{flex:none; width:86px; font-family:var(--mono); font-size:11px; color:var(--sage); padding-top:2px}
.tl .c{flex:none; width:64px; font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); padding-top:4px}
.tl .e{color:var(--text)}

.chan{border:1px solid var(--line2); border-radius:11px; background:var(--panel); padding:20px 22px; margin-bottom:13px}
.chan .ch-h{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--sage); margin-bottom:9px}
.chan .ch-dot{width:5px; height:5px; border-radius:50%; background:var(--sage); box-shadow:0 0 6px var(--sage); animation:dotpulse 1.2s ease-in-out infinite}
.chan .ch-s{font-size:15px; font-weight:600; color:var(--text); margin-bottom:8px}
.chan ul{margin:0; padding-left:18px; color:var(--muted); font-size:13.8px; line-height:1.65}
.chan li{margin-bottom:5px}

.move{border:1px solid rgba(227,169,44,.4); border-left:3px solid var(--gold); border-radius:0 12px 12px 0; background:rgba(227,169,44,.05); padding:20px 24px; margin-top:6px}
.move .lbl{color:var(--gold)}
.move p{margin:9px 0 0; font-size:15.5px; line-height:1.65; color:var(--text)}

.empty{max-width:520px; margin:90px auto; text-align:center; color:var(--muted); font-size:15px; line-height:1.7}
.empty .lbl{display:block; margin-bottom:14px}

footer{border-top:1px solid var(--line2); margin-top:56px; padding:22px 0 0; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap}
.foot-l{font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; color:var(--faint)}
.foot-cta{font-family:var(--mono); font-size:11px; letter-spacing:.04em}
@media(max-width:560px){.tl .c{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="brand" href="index.html">
      <span class="crest"><svg viewBox="0 0 24 24" fill="none"><path d="M3 12C6.6 6.7 17.4 6.7 21 12C17.4 17.3 6.6 17.3 3 12Z" stroke="#57d2cf" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3.5" stroke="#57d2cf" stroke-width="1.6"/><path d="M12 8.5v7M8.5 12h7" stroke="#57d2cf" stroke-width="1.1"/><circle cx="12" cy="12" r="1.1" fill="#e2554f"/></svg></span>
      <b>WatchBack</b>
    </a>
    <span class="tagl">Weekly intelligence report</span>
    <button class="share" id="shareBtn" onclick="copyLink()" style="display:none">Copy share link</button>
  </div>
  <div id="body"><div class="empty"><span class="lbl">Retrieving dossier…</span></div></div>
</div>

<script>
var API = 'https://competitor-intelligence-production-2629.up.railway.app';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
var Q = new URLSearchParams(location.search);
var HOST = (Q.get('host')||'').toLowerCase().replace(/^https?:\/\//,'').replace(/\/.*$/,'').replace(/^www\./,'');

function copyLink(){
  var u = 'https://watchback.ai/report.html?host=' + encodeURIComponent(HOST) + (Q.get('week') ? '&week=' + encodeURIComponent(Q.get('week')) : '');
  (navigator.clipboard ? navigator.clipboard.writeText(u) : Promise.reject()).then(function(){
    var b = document.getElementById('shareBtn'); b.textContent = 'Link copied ✓'; b.classList.add('ok');
    setTimeout(function(){ b.textContent = 'Copy share link'; b.classList.remove('ok'); }, 1800);
  }).catch(function(){ prompt('Copy this link:', u); });
}

function render(d){
  var r = d.report || {};
  document.title = d.brand + ' — Weekly report · WatchBack';
  var s = d.stats || {};
  var stats = [
    [s.newAds, 'new ads launched'],
    [(s.adsEnd != null ? s.adsEnd : '—'), 'ads active at week end'],
    [s.posts, 'posts published'],
    [s.emails, 'email campaigns'],
  ].map(function(p){ return '<div class="stat"><div class="n">' + esc(p[0] == null ? '—' : p[0]) + '</div><div class="l">' + p[1] + '</div></div>'; }).join('');
  var tl = (r.timeline || []).map(function(t){
    return '<li><span class="d">' + esc(t.day || '') + '</span><span class="c">' + esc(t.channel || '') + '</span><span class="e">' + esc(t.event || '') + '</span></li>';
  }).join('');
  var chans = ['ads','social','website','email'].map(function(k){
    var c = (r.channels || {})[k]; if(!c || !(c.summary || (c.bullets||[]).length)) return '';
    return '<div class="chan"><div class="ch-h"><span class="ch-dot"></span>' + k + '</div>'
      + (c.summary ? '<div class="ch-s">' + esc(c.summary) + '</div>' : '')
      + ((c.bullets||[]).length ? '<ul>' + c.bullets.map(function(b){ return '<li>' + esc(b) + '</li>'; }).join('') + '</ul>' : '')
      + '</div>';
  }).join('');
  document.getElementById('body').innerHTML =
    '<div class="rep-head">'
    + '<span class="rep-kind"><span class="dot"></span>Subject file · weekly digest</span>'
    + '<h1>' + esc(d.brand) + '</h1>'
    + '<div class="weekline">' + esc(d.host) + ' · ' + esc((d.week && d.week.label) || '') + ' · generated ' + esc(String(d.generatedAt || '').slice(0, 10)) + '</div>'
    + '<p class="headline"><b>' + esc(r.headline || '') + '</b></p>'
    + '<div class="statrow">' + stats + '</div>'
    + '</div>'
    + '<section><span class="lbl">Executive summary</span><h2 style="display:none"></h2><div class="summary">' + esc(r.summary || '') + '</div></section>'
    + (tl ? '<section><span class="lbl">The week, as it happened</span><ul class="tl" style="margin-top:14px">' + tl + '</ul></section>' : '')
    + (chans ? '<section><span class="lbl">Intercepted signals</span><div style="margin-top:14px">' + chans + '</div></section>' : '')
    + (r.move ? '<section><div class="move"><span class="lbl">Recommended counter-op</span><p>' + esc(r.move) + '</p></div></section>' : '')
    + '<footer><span class="foot-l">Generated by WatchBack · every claim traces to captured data</span><span class="foot-cta"><a href="index.html">Get this on your competitors → watchback.ai</a></span></footer>';
  document.getElementById('shareBtn').style.display = '';
}

function empty(msg){
  document.getElementById('body').innerHTML = '<div class="empty"><span class="lbl">No report yet</span>' + msg
    + '<div style="margin-top:22px"><a href="index.html">← watchback.ai</a></div></div>';
}

if(!HOST){ empty('Add <code>?host=competitor.com</code> to the link to open a report.'); }
else{
  var url = Q.get('mock') ? 'weekly-mock.json' : API + '/api/weekly?host=' + encodeURIComponent(HOST) + (Q.get('week') ? '&week=' + encodeURIComponent(Q.get('week')) : '');
  fetch(url).then(function(x){ return x.json(); }).then(function(j){
    var d = j.report || j;
    if(d && d.brand && d.report) render(d);
    else empty('This competitor\'s first weekly report generates automatically on Monday, covering the full Monday–Sunday week.');
  }).catch(function(){ empty('Couldn\'t reach the report service — try again in a moment.'); });
}
</script>
</body>
</html>
