<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IntelAI — Surveillance Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b0d; --panel:#0d1318; --panel2:#101a20; --raised:#13212a;
  --line:rgba(120,170,180,.13); --line2:rgba(120,170,180,.26);
  --sage:#57d2cf; --sage-d:#3f9d9b; --sage-soft:rgba(87,210,207,.1);
  --gold:#e3a92c; --clay:#e2554f;
  --act:#e2554f; --watch:#e3a92c; --quiet:#62bd7e;
  --text:#cdd6da; --muted:#8a99a2; --faint:#5e6e76;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;
  background-image:linear-gradient(rgba(120,170,180,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(120,170,180,.03) 1px,transparent 1px);background-size:48px 48px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0,rgba(0,0,0,.12) 1px,transparent 1px,transparent 3px)}
.serif{font-family:'Oswald',sans-serif}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:9px}::-webkit-scrollbar-thumb{background:rgba(87,210,207,.2);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
.lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

/* ── masthead ── */
.top{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid var(--line2);background:var(--panel);position:relative;z-index:5}
.brand{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit}
.crest{width:34px;height:34px;border-radius:50%;border:1px solid var(--sage-d);display:flex;align-items:center;justify-content:center;background:var(--sage-soft)}
.bn{font-family:'Oswald',sans-serif;font-weight:600;font-size:18px;letter-spacing:.005em}
.div{width:1px;height:18px;background:var(--line2)}
.mast{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.18em;color:var(--sage);text-transform:uppercase}
.top-date{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--muted)}
.topmeta{display:flex;align-items:center;gap:16px}
.classy{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--clay);border:1px solid rgba(226,85,79,.4);padding:4px 11px;border-radius:3px;background:rgba(226,85,79,.07)}
.recd{width:7px;height:7px;border-radius:50%;background:var(--clay);box-shadow:0 0 7px var(--clay);animation:rec 1.4s steps(2) infinite}
@keyframes rec{50%{opacity:.25}}

/* ── shell ── */
.app{display:flex;height:calc(100vh - 60px);position:relative;z-index:1}
.rail{width:332px;flex-shrink:0;border-right:1px solid var(--line2);overflow-y:auto;background:var(--panel)}
.detail{flex:1;overflow-y:auto;background:var(--bg);position:relative}
/* Collapsible rail (desktop): logos only, expands to the full list on hover. */
@media(min-width:881px){
  .rail{position:absolute;left:0;top:0;bottom:0;width:76px;z-index:20;overflow-x:hidden;transition:width .24s cubic-bezier(.4,0,.2,1)}
  .rail:hover{width:332px;box-shadow:24px 0 70px rgba(0,0,0,.5)}
  .detail{margin-left:76px}
  .rail .row-main{opacity:0;transition:opacity .1s}
  .rail:hover .row-main{opacity:1;transition:opacity .2s .1s}
  .rail:not(:hover) .rail-h{justify-content:center}
  .rail:not(:hover) .rail-h .lbl{display:none}
  .rail:not(:hover) .add-btn{padding:8px}
  .rail:not(:hover) .add-btn .abl{display:none}
  .rail:not(:hover) .row{padding-left:20px}
}

/* ── rail ── */
.rail-h{position:sticky;top:0;background:var(--panel);z-index:2;display:flex;align-items:center;justify-content:space-between;padding:18px 18px 13px;border-bottom:1px solid var(--line)}
.add-btn{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sage);background:none;border:1px solid var(--line2);border-radius:20px;padding:6px 13px;transition:.15s}
.add-btn:hover{border-color:var(--sage-d);background:var(--sage-soft)}
.rail-list{padding:4px 0}
.row{width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);padding:15px 18px;display:flex;gap:13px;align-items:center;transition:background .12s;position:relative}
.row:hover{background:var(--panel2)}
.row.sel{background:var(--panel2)}
.row.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--sage)}
.badge{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;color:#16222b;background:#eceff0;border:1px solid var(--line2);overflow:hidden}
.badge img{width:22px;height:22px;border-radius:50%}
.row-main{flex:1;min-width:0}
.row-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.row-name{font-family:'Oswald',sans-serif;font-size:16.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-time{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--faint);flex-shrink:0;text-transform:uppercase}
.row-sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.row-stat{font-size:9.5px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;margin-top:7px;display:inline-flex;align-items:center;gap:6px}
.stat-dot{width:6px;height:6px;border-radius:50%}
.act{color:var(--act)} .watch{color:var(--watch)} .quiet{color:var(--quiet)} .setup{color:var(--sage)}
.bg-act{background:var(--act)} .bg-watch{background:var(--watch)} .bg-quiet{background:var(--quiet)} .bg-setup{background:var(--sage)}

/* ── report ── */
.back-btn{display:none}
.report{max-width:1480px;margin:0 auto;padding:40px 60px 96px;position:relative;z-index:1}
@media(max-width:560px){.report{padding:24px 20px 70px}}
.botanical{position:absolute;top:24px;right:30px;width:118px;opacity:.07;pointer-events:none;z-index:0}
.rep-head{display:flex;align-items:flex-start;gap:16px;padding-bottom:26px;border-bottom:1px solid var(--line2);margin-bottom:32px;position:relative;z-index:1}
.rep-badge{width:54px;height:54px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;color:#16222b;background:#eceff0;border:1px solid var(--line2);overflow:hidden}
.rep-badge img{width:34px;height:34px;border-radius:50%}
.rep-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:28px;letter-spacing:-.01em;line-height:1.08;margin-top:2px}
.rep-meta{font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:.05em;color:var(--muted);margin-top:8px}
.rep-status{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.rep-status .s{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;display:inline-flex;align-items:center;gap:7px}
.live{display:inline-flex;align-items:center;gap:5px;color:var(--quiet)}
.livedot{width:6px;height:6px;border-radius:50%;background:var(--quiet);box-shadow:0 0 0 3px rgba(98,189,126,.22);animation:lp 2.2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.4}}
.lr{color:var(--faint)}

.assess{margin-bottom:34px;position:relative;z-index:1}
.assess .lbl{display:block;margin-bottom:14px;color:var(--sage-d)}
.verdict{font-family:'Inter',sans-serif;font-weight:400;font-size:18.5px;line-height:1.62;letter-spacing:0;color:#dde6e9;margin:0;max-width:760px}
.verdict::first-letter{font-size:1.1em;font-weight:500}

.move{border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:22px 0 22px 24px;position:relative;margin-bottom:42px;z-index:1}
.move::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--sage)}
.move .lbl{display:block;margin-bottom:12px;color:var(--sage-d)}
.move-t{font-size:15.5px;line-height:1.62;color:var(--text);margin:0;max-width:760px}

.sec-l{display:block;margin-bottom:2px;padding-bottom:15px;border-bottom:1px solid var(--line2);position:relative;z-index:1}
.chans{position:relative;z-index:1}
.chan{border-bottom:1px solid var(--line)}
.chan-head{width:100%;background:none;border:none;display:flex;align-items:center;padding:18px 2px;text-align:left}
.chan.on .chan-head{cursor:pointer}
.chan-name{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);width:130px;flex-shrink:0}
.chan.on .chan-name{color:var(--text)}
.chan-sum{font-size:14px;color:var(--text);flex:1;min-width:0}
.chan-sum.q{color:var(--faint);font-style:italic;font-family:'Oswald',sans-serif;font-size:13.5px}
.chan-sum b{font-weight:600}
.flag{color:var(--gold);font-weight:500}
.chev{color:var(--faint);transition:transform .2s;flex-shrink:0}
.chan.open .chev{transform:rotate(180deg)}
.chan-body{display:none;padding:0 0 22px 130px}
.chan.open .chan-body{display:block}
@media(max-width:560px){.chan-body{padding-left:0}.chan-name{width:92px}.botanical{display:none}}

.wstats{font-size:12.5px;color:var(--muted);margin-bottom:15px;padding-bottom:12px;border-bottom:1px solid var(--line);text-transform:none;letter-spacing:0}
.note{font-size:14px;color:var(--muted);line-height:1.62;margin-top:14px;font-style:italic;font-family:'Oswald',sans-serif;max-width:720px}
.adstrip{display:flex;gap:13px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x proximity}
.adstrip::-webkit-scrollbar{height:7px}
.adstrip::-webkit-scrollbar-thumb{background:rgba(87,210,207,.18);border-radius:5px}
.adthumb{width:188px;flex-shrink:0;border-radius:12px;overflow:hidden;border:1px solid var(--line2);background:var(--panel2);text-decoration:none;display:block;scroll-snap-align:start;transition:transform .16s,border-color .16s,box-shadow .16s}
.adthumb:hover{transform:translateY(-3px);border-color:var(--sage-d);box-shadow:0 14px 30px rgba(0,0,0,.34)}
.adthumb .media{position:relative;width:100%;height:212px;background:var(--raised);overflow:hidden}
.adthumb .media img{width:100%;height:100%;object-fit:cover;display:block}
.adthumb .media.noimg::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 38%,rgba(87,210,207,.12),transparent 70%)}
.adthumb .nw{position:absolute;top:10px;left:10px;z-index:3;font-size:9px;font-weight:600;letter-spacing:.05em;background:var(--sage);color:#0b1311;padding:2px 8px;border-radius:20px;text-transform:uppercase}
.adthumb .nw.vid,.adthumb .nw.alt{background:rgba(0,0,0,.62);color:#fff;letter-spacing:.02em}
.adthumb .pl{position:absolute;top:10px;right:10px;z-index:3;font-size:10px;font-weight:600;background:rgba(0,0,0,.6);color:#fff;padding:3px 9px;border-radius:20px;backdrop-filter:blur(4px)}
.adthumb .cap{padding:11px 13px 13px;font-size:12.5px;line-height:1.46;color:var(--text);height:74px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.adthumb .go{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;opacity:0;background:rgba(12,16,9,.4);transition:opacity .16s}
.adthumb:hover .go{opacity:1}
.adthumb .go span{width:36px;height:36px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center}
.adthumb .cstats{position:absolute;left:8px;bottom:8px;z-index:3;display:flex;gap:6px}
.cstat{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#fff;background:rgba(0,0,0,.62);padding:2px 7px;border-radius:11px;backdrop-filter:blur(3px)}
.cstat svg{width:10px;height:10px;fill:#fff;display:block}
.wshot{display:block;position:relative;border-radius:11px;overflow:hidden;border:1px solid var(--line2);margin-bottom:16px;max-width:600px;background:var(--raised);transition:border-color .15s}
.wshot:hover{border-color:var(--sage-d)}
.wshot img{width:100%;display:block;min-height:140px}
.wshot-go{position:absolute;right:10px;bottom:10px;font-size:11px;font-weight:600;background:rgba(0,0,0,.6);color:#fff;padding:4px 11px;border-radius:14px;backdrop-filter:blur(4px)}
.webcmp{margin-top:2px}
.cmp{position:relative;max-width:600px;border-radius:11px;overflow:hidden;border:1px solid var(--line2);background:var(--raised);margin-bottom:10px}
.cmp img{display:block;width:100%}
.cmp .cmp-top{position:absolute;inset:0;width:100%;clip-path:inset(0 50% 0 0)}
.cmp-split{position:absolute;top:0;bottom:0;left:50%;width:2px;margin-left:-1px;background:var(--sage);box-shadow:0 0 10px var(--sage);pointer-events:none;z-index:2}
.cmp-grip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;background:var(--sage);color:#06231f;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.cmp-range{position:absolute;inset:0;width:100%;height:100%;margin:0;padding:0;border:none;opacity:0;cursor:ew-resize;z-index:4}
.cmp-tag{position:absolute;top:10px;font-family:var(--mono);font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:4px 9px;border-radius:4px;pointer-events:none;z-index:3}
.cmp-tl{left:10px;background:rgba(0,0,0,.62);color:#fff}
.cmp-tr{right:10px;background:var(--sage);color:#06231f}
.cmp-hint{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin:0 0 14px 2px}
.wchg{display:flex;flex-direction:column;border:1px solid var(--line2);border-radius:11px;overflow:hidden;max-width:600px}
.wchg-row{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;font-size:13.5px;color:var(--text);border-bottom:1px solid var(--line2);line-height:1.45}
.wchg-row:last-child{border-bottom:none}
.wchg-dot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-top:6px;box-shadow:0 0 7px var(--gold)}
.wbase{max-width:600px;border:1px dashed var(--line2);border-radius:11px;padding:14px 16px;font-size:13px;color:var(--muted);line-height:1.55}
.wbase b{color:var(--text)}
.eml-shots{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.eml-shots a{display:block;border-radius:7px;overflow:hidden;border:1px solid var(--line2);transition:transform .15s}
.eml-shots a:hover{transform:translateY(-2px)}
.eml-shots img{height:92px;width:auto;max-width:160px;object-fit:cover;display:block;background:var(--raised)}
.adlink{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sage);text-decoration:none;margin-top:15px}
.adlink:hover{color:var(--quiet)}
.adsbox{margin-bottom:2px}
.adsload{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);font-style:italic;font-family:'Oswald',sans-serif;padding:4px 0 14px}
.spin{width:13px;height:13px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--sage);animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.adssum{font-size:12.5px;color:var(--muted);margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--line)}
.adssum b{color:var(--text);font-weight:600}
.adsempty{font-size:13.5px;color:var(--faint);font-style:italic;font-family:'Oswald',sans-serif;padding:4px 0 12px}
.rtry{color:var(--sage);font-style:normal;font-weight:600;text-decoration:underline;cursor:pointer}
.rtry:hover{color:var(--quiet)}
.soc{margin-bottom:22px}
.soc:last-child{margin-bottom:2px}
.soc-h{display:flex;align-items:baseline;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.soc-p{font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text)}
.soc-m{font-size:11.5px;color:var(--muted)}
.eml{display:flex;gap:15px;padding:13px 0;border-bottom:1px solid var(--line);align-items:baseline}
.eml:last-child{border-bottom:none}
.eml-d{font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);width:52px;flex-shrink:0;white-space:nowrap}
.eml-main{flex:1;min-width:0}
.eml-top{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.eml-sub{font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
.eml-tag{font-size:9.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--clay);border:1px solid rgba(200,128,111,.42);padding:1px 8px;border-radius:20px;white-space:nowrap}
.eml-pre{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:4px;max-width:780px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.subcard{border:1px solid var(--line2);background:linear-gradient(180deg,var(--sage-soft),transparent);border-radius:11px;padding:15px 16px;margin-bottom:15px;max-width:760px}
.subcard-h{font-size:13px;font-weight:600;color:var(--text);margin-bottom:11px}
.subrow{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.subaddr{font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--sage);background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:8px 11px;flex:1;min-width:190px;overflow:auto;white-space:nowrap}
.subcopy{font-size:12px;font-weight:600;color:#0b1311;background:var(--sage);border:none;border-radius:8px;padding:9px 17px;flex-shrink:0;transition:.15s}
.subcopy:hover,.subcopy.ok{background:var(--quiet)}
.substeps{font-size:12.5px;color:var(--muted);line-height:1.55}
.substeps b{color:var(--text);font-weight:600}
.substeps a{color:var(--sage);text-decoration:none;font-weight:500}
.substeps a:hover{color:var(--quiet)}
.subact{display:flex;align-items:center;gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap}
.subconfirm{font-size:12px;font-weight:600;color:var(--sage);background:none;border:1px solid var(--sage-d);border-radius:8px;padding:8px 15px;transition:.15s}
.subconfirm:hover{background:var(--sage-soft)}
.substat{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:8px;line-height:1.5}
.subok{font-size:13.5px;font-weight:600;color:var(--quiet);background:rgba(87,210,207,.1);border:1px solid var(--sage-d);border-radius:9px;padding:11px 14px;margin-bottom:14px;max-width:760px}
.drow{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.dmark{font-size:15px;font-weight:600;width:16px;flex-shrink:0;margin-top:1px;font-family:'Oswald',sans-serif}
.dmark.up{color:var(--act)} .dmark.new{color:var(--quiet)} .dmark.alt{color:var(--gold)}
.ds{font-size:14px;font-weight:500;line-height:1.4}
.dd{font-size:13px;color:var(--muted);margin-top:3px}
.dd b{color:var(--text);font-weight:600}
.post,.mailr{display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.post:last-child,.mailr:last-child{border-bottom:none}
.pthumb{width:36px;height:46px;border-radius:5px;flex-shrink:0;position:relative;overflow:hidden;text-decoration:none}
.pthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pcap{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmet{font-size:11px;font-weight:500;color:var(--faint);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
.mic{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:var(--raised);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:14px;color:var(--sage);font-weight:600}

.setup-note{font-family:'Oswald',sans-serif;font-style:italic;font-size:17px;color:var(--muted);line-height:1.65;margin:0 0 30px;position:relative;z-index:1;max-width:760px}
.setup-note b{color:var(--text);font-style:normal;font-weight:600}
.empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--muted);position:relative;z-index:1}
.empty .ei{width:56px;height:56px;border-radius:50%;border:1px solid var(--sage-d);background:var(--sage-soft);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty h3{font-family:'Oswald',sans-serif;font-size:22px;color:var(--text);margin:0 0 8px;font-weight:600}
.empty p{font-size:14px;margin:0 0 22px;max-width:280px;line-height:1.6}
.btn{font-size:13.5px;font-weight:600;border-radius:22px;border:none;padding:11px 20px;transition:.15s}
.btn-g{background:none;border:1px solid var(--line2);color:var(--text)}
.btn-g:hover{border-color:var(--muted)}
.btn-p{background:var(--sage);color:#0b1311;font-weight:600}
.btn-p:hover{background:var(--quiet)}

.ov{position:fixed;inset:0;z-index:50;background:rgba(8,11,5,.78);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{width:100%;max-width:420px;background:var(--panel2);border:1px solid var(--line2);border-radius:16px;padding:28px;box-shadow:0 40px 90px rgba(0,0,0,.6)}
.modal h2{font-family:'Oswald',sans-serif;font-weight:600;font-size:22px;margin:0 0 6px}
.modal p{color:var(--muted);font-size:13.5px;margin:0 0 22px;line-height:1.55}
.fld{margin-bottom:16px}
.fld label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.fld input{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s}
.fld input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-soft)}
.fld .er{color:var(--act);font-size:12px;margin-top:6px;display:none}
.m-act{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
/* ── AI chat ── */
.chatfab{position:fixed;bottom:22px;right:22px;z-index:40;display:inline-flex;align-items:center;gap:8px;background:var(--sage);color:#0b1311;border:none;border-radius:24px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,.42);transition:.15s}
#dateNavWrap .datenav{margin-bottom:0}
.chatfab:hover{background:var(--quiet);transform:translateY(-2px)}
.chatpanel{position:fixed;top:0;right:0;bottom:0;width:412px;max-width:93vw;z-index:60;background:var(--panel);border-left:1px solid var(--line2);box-shadow:-24px 0 70px rgba(0,0,0,.5);display:flex;flex-direction:column;transform:translateX(101%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
.chatpanel.open{transform:translateX(0)}
.chat-h{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line2);flex-shrink:0}
.chat-t{font-family:'Oswald',sans-serif;font-weight:600;font-size:18px}
.chat-sub{font-size:12px;color:var(--muted);margin-top:2px}
.chat-x{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px}
.chat-x:hover{color:var(--text)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.cmsg{max-width:88%;padding:11px 14px;border-radius:13px;font-size:13.5px;line-height:1.52;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
.cmsg.user{align-self:flex-end;background:var(--raised);border:1px solid var(--line2);border-bottom-right-radius:4px}
.cmsg.ai{align-self:flex-start;background:var(--sage-soft);border:1px solid var(--sage-d);border-bottom-left-radius:4px}
.cmsg.sys{align-self:stretch;max-width:none;background:none;border:none;color:var(--faint);font-style:italic;font-family:'Oswald',sans-serif;font-size:13px;text-align:center;padding:8px 6px}
.ctyping{align-self:flex-start;color:var(--muted);font-size:13px;font-style:italic;display:inline-flex;gap:9px;align-items:center}
.chat-foot{border-top:1px solid var(--line2);padding:12px 16px 16px;flex-shrink:0}
.chat-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.cchip{font-size:11.5px;color:var(--sage);background:none;border:1px solid var(--line2);border-radius:16px;padding:6px 11px;cursor:pointer;transition:.15s;text-align:left}
.cchip:hover{border-color:var(--sage-d);background:var(--sage-soft)}
.chat-inwrap{display:flex;gap:8px;align-items:center}
.chat-in{flex:1;background:var(--bg);border:1px solid var(--line2);border-radius:22px;padding:11px 16px;color:var(--text);font-family:inherit;font-size:13.5px;outline:none}
.chat-in:focus{border-color:var(--sage)}
.chat-send{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:var(--sage);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.chat-send:hover{background:var(--quiet)}
@media(max-width:560px){.chatfab span{display:none}.chatfab{padding:14px;border-radius:50%}}
/* ── date navigator (compact, top-right) ── */
.datenav{display:inline-flex;align-items:center;gap:3px;border:1px solid var(--line2);border-radius:9px;padding:2px;background:var(--panel2);margin-bottom:9px}
.datenav.hist{border-color:var(--sage-d);background:var(--sage-soft)}
.datenav .dnav{width:24px;height:24px;border-radius:6px;border:none;background:none;color:var(--text);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.datenav .dnav:hover:not(:disabled){background:var(--sage-soft)}
.datenav .dnav:disabled{opacity:.3;cursor:default}
.datenav .dlabel{font-size:12px;font-weight:600;color:var(--text);min-width:50px;text-align:center}
.snaplbl{color:var(--gold);font-weight:500}

@media(max-width:880px){
  .rail{width:100%}
  .mast,.div,.top-date{display:none}
  .app[data-view="list"] .detail{display:none}
  .app[data-view="detail"] .rail{display:none}
  .back-btn{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:0;margin:0 0 22px}
}
</style>

<body>

<div class="top">
  <a class="brand" href="index.html" title="Back to site">
    <span class="crest"><svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="#57d2cf" stroke-width="1.1"><circle cx="8" cy="8" r="5.4"/><path d="M8 .8v3M8 12.2v3M.8 8h3M12.2 8h3" stroke-linecap="round"/><circle cx="8" cy="8" r="1.3" fill="#57d2cf" stroke="none"/></svg></span>
    <span class="bn">IntelAI</span>
  </a>
  <div class="topmeta">
    <span class="top-date" id="topDate"></span>
    <div id="dateNavWrap"></div>
  </div>
</div>

<div class="app" id="app" data-view="list">
  <aside class="rail">
    <div class="rail-h">
      <span class="lbl" style="white-space:nowrap">Competitor watchlist</span>
      <button class="add-btn" onclick="openModal()"><svg width="11" height="11" fill="none" viewBox="0 0 11 11"><path d="M5.5 1.5v8M1.5 5.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><span class="abl">Add</span></button>
    </div>
    <div class="rail-list" id="railList"></div>
  </aside>
  <main class="detail" id="detail"></main>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Add a competitor</h2>
    <p>We'll observe their ads, social, website, and email — then tell you what it means and what to do.</p>
    <div class="fld"><label for="fN">Brand name</label><input id="fN" type="text" placeholder="e.g. The Oodie" autocomplete="off"/><div class="er" id="eN">Please enter a name.</div></div>
    <div class="fld"><label for="fU">Website</label><input id="fU" type="text" placeholder="e.g. theoodie.com" autocomplete="off"/><div class="er" id="eU">Please enter a valid website.</div></div>
    <div class="m-act"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="submitComp()">Add to Watchlist</button></div>
  </div>
</div>

<button class="chatfab" id="chatFab" onclick="openChat()" title="Ask the AI about this competitor">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.2l1.7 4.6 4.6 1.7-4.6 1.7L8 13.8 6.3 9.2 1.7 7.5l4.6-1.7L8 1.2Z" fill="#0b1311"/></svg><span>Ask AI</span>
</button>
<div class="chatpanel" id="chatPanel" aria-hidden="true">
  <div class="chat-h">
    <div><div class="chat-t">Ask IntelAI</div><div class="chat-sub" id="chatSub">about this competitor</div></div>
    <button class="chat-x" onclick="closeChat()" title="Close">✕</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-foot">
    <div class="chat-chips" id="chatChips"></div>
    <div class="chat-inwrap">
      <input id="chatInput" class="chat-in" type="text" autocomplete="off" placeholder="Ask about their ads, offers, emails…" onkeydown="if(event.key==='Enter')sendChat()"/>
      <button class="chat-send" onclick="sendChat()" title="Send"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h10M8 4l4 4-4 4" stroke="#0b1311" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>
</div>

<script>
var KEY='intelai_v5';
var API='https://competitor-intelligence-production-2629.up.railway.app';
var BOTANICAL='<svg class="botanical" viewBox="0 0 130 130" fill="none" stroke="#3f9d9b" stroke-width="1"><circle cx="65" cy="65" r="58"/><circle cx="65" cy="65" r="38"/><circle cx="65" cy="65" r="3.5"/><path d="M65 2v26M65 102v26M2 65h26M102 65h26" stroke-linecap="round"/><path d="M30 30l12 12M100 30L88 42M30 100l12-12M100 100L88 88" stroke-linecap="round" opacity="0.6"/></svg>';

var CH=[{k:'ads',label:'Ads'},{k:'social',label:'Organic Social'},{k:'website',label:'Website'},{k:'email',label:'Email'}];
var PRIO={act:{l:'Active'},watch:{l:'Monitoring'},quiet:{l:'Dormant'},setup:{l:'Acquiring'}};
var ORD={act:0,watch:1,setup:2,quiet:3};

/* The Oodie + Ancestral Cosmetics — seeded with REAL data captured from their live stores. */
var DEMOS=[
  {
    id:'oodie',demo:true,live:true,name:'The Oodie',host:'theoodie.com',url:'https://www.theoodie.com',country:'AU',
    handles:{ig:'the_oodie',tt:'the_oodie',fb:'theofficialoodie'},
    priority:'act',captured:'21 Jun 2026',base:{products:26,onSale:18},
    oneLiner:'Deep EOFY sale — Originals 40% off',
    verdict:'Deep into an End-of-Financial-Year discount blitz — Oodie Originals are 40% off ($59, down from $99), with a sitewide sale spanning the Care Bears, Tamagotchi and Cloud ranges, plus fresh licensed collabs.',
    move:'They’re buying volume at the expense of margin. Expect heavy price and ad pressure through June 30 — don’t blanket-match 40%. Counter with a bundle or free-gift to defend AOV, and watch whether the sale outlasts EOFY.',
    channels:{
      ads:{active:true,summary:'<span class="flag">Live in Meta Ad Library</span>',angle:'Open their live ad library to see exactly which creatives and offers are running behind this sale.'},
      social:{active:true,angle:'How their sale themes play out organically — Care Bears, Wiggles and licensed collabs — and which posts actually land.'},
      website:{active:true,summary:'<b>Up to 50% off</b> · Originals $59',stats:'26 products · $47–$119 · ~18 of 26 currently on sale',changes:[
        {m:'up',s:'Sitewide EOFY sale live',d:'Up to <b>50% off</b> — End of Financial Year'},
        {m:'up',s:'Oodie Originals discounted',d:'<b>$59</b>, down from $99 — <b>40% off</b>'},
        {m:'new',s:'Newest drops',d:'Splatter Oodie + Tamagotchi Collection (Jun 2)'}
      ]},
      email:{active:false}
    }
  },
  {
    id:'ancestral',demo:true,live:true,name:'Ancestral Cosmetics',host:'ancestralcosmetics.com',url:'https://ancestralcosmetics.com',
    handles:{ig:'ancestralskin',tt:'ancestralskin',fb:'ancestralskin'},
    priority:'watch',captured:'21 Jun 2026',base:{products:25,onSale:4},
    oneLiner:'Premium, no-discount — bundle & gift led',
    verdict:'Holding a premium, no-discount posture — no sale event, just modest multi-pack savings. Growth is engineered through a deep bundle ladder (Essentials £80 → Ultimate £156) and a “free lip balm over £80” gift that lifts basket size while protecting margin.',
    move:'They don’t discount — they free-gift and bundle, so you won’t beat them on price. Compete on a sharper story or a tighter segment, and watch whether the new Velvet Dust line expands into a full range.',
    channels:{
      ads:{active:true,summary:'<span class="flag">Live in Meta Ad Library</span>',angle:'Open their live ad library — their ads lean on heritage, grass-fed Irish tallow, and ingredient provenance.'},
      social:{active:true,angle:'Heritage and ingredient-provenance storytelling — tallow, grass-fed Irish sourcing — and which posts resonate.'},
      website:{active:true,summary:'<b>No sale</b> · bundle &amp; gift led',stats:'25 products · £9–£156 · no sale event (multi-pack savings only)',changes:[
        {m:'new',s:'Free-gift offer running',d:'“Spend £80, get a free lip balm” — lifts AOV, protects margin'},
        {m:'new',s:'Deep bundle ladder',d:'Essentials £80 → Ultimate £156 · 10+ sets'},
        {m:'new',s:'Newest line',d:'Velvet Dust range — deodorant, body cream, bundle'}
      ]},
      email:{active:false}
    }
  }
];

var state={sel:null,day:null};
var viewSnap=null,histDays={};
var liveCache={};

function load(){try{var r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(l){try{localStorage.setItem(KEY,JSON.stringify(l));}catch(e){}}
function getList(){
  var l=load();
  if(l===null){
    var mig=[];
    ['intelai_v4','intelai_competitors_v3','intelai_competitors_v2','intelai_competitors_v1'].forEach(function(k){
      try{JSON.parse(localStorage.getItem(k)||'[]').forEach(function(c){
        if(c&&c.demo===false&&c.name&&!mig.some(function(m){return m.host===c.host;}))
          mig.push({id:c.id||('c-'+Date.now()+Math.round(Math.random()*1e4)),demo:false,name:c.name,host:c.host,url:c.url,updatedAt:c.addedAt||c.updatedAt||Date.now()});
      });}catch(e){}
    });
    l=DEMOS.concat(mig);save(l);
  }
  return l;
}
function sorted(){return getList().slice().sort(function(a,b){var pa=a.demo?a.priority:'setup',pb=b.demo?b.priority:'setup';return (ORD[pa]-ORD[pb])||((b.updatedAt||0)-(a.updatedAt||0));});}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fav(h){return 'https://www.google.com/s2/favicons?domain='+encodeURIComponent(h)+'&sz=64';}
function mono(n){var p=String(n||'?').trim().split(/\s+/);return((p[0]||'?')[0]+((p[1]||'')[0]||'')).toUpperCase();}
function ago(t){var m=Math.round((Date.now()-t)/6e4);if(m<60)return Math.max(1,m)+'m';var h=Math.round(m/60);if(h<24)return h+'h';return Math.round(h/24)+'d';}
function badge(c){return '<img src="'+fav(c.host)+'" onerror="this.style.display=\'none\';this.parentNode.textContent=\''+mono(c.name)+'\'">';}

function railRow(c){
  var p=c.demo?c.priority:'setup';
  var t=c.live?'<span style="color:var(--quiet)">LIVE</span>':ago(c.updatedAt||Date.now());
  return '<button class="row'+(c.id===state.sel?' sel':'')+'" onclick="select(\''+c.id+'\')">'
    +'<span class="badge">'+badge(c)+'</span>'
    +'<span class="row-main"><span class="row-top"><span class="row-name">'+esc(c.name)+'</span><span class="row-time">'+t+'</span></span>'
    +'<span class="row-sub">'+esc(c.demo?c.oneLiner:'Baseline capturing…')+'</span></span></button>';
}

var PLAT={FACEBOOK:'Facebook',INSTAGRAM:'Instagram',AUDIENCE_NETWORK:'Audience',MESSENGER:'Messenger',THREADS:'Threads'};
function prettyPlat(p){return PLAT[p]||p;}
function fmtDate(s){var p=String(s||'').split('-');if(p.length!==3)return s||'';var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return parseInt(p[2],10)+' '+mo[(parseInt(p[1],10)||1)-1];}
function isRecent(s){var t=Date.parse((s||'')+'T00:00:00');return !isNaN(t)&&(Date.now()-t)<18*864e5;}
function postCard(o){
  var img=o.image?'<img src="'+esc(o.image)+'" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.classList.add(\'noimg\')">':'';
  var go='<span class="go"><span><svg width="15" height="15" fill="none" viewBox="0 0 14 14"><path d="M5 9l4.2-4.2M5.5 4.8H9.2V8.5" stroke="#0b1311" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>';
  return '<a class="adthumb" href="'+esc(o.link||'#')+'" target="_blank" rel="noopener">'
    +'<span class="media'+(o.image?'':' noimg')+'">'+img+(o.tl||'')+(o.tr?'<span class="pl">'+esc(o.tr)+'</span>':'')+(o.stats?'<span class="cstats">'+o.stats+'</span>':'')+go+'</span>'
    +'<span class="cap">'+esc(o.cap||'')+'</span></a>';
}
var STAT_ICONS={
  like:'<svg viewBox="0 0 16 16"><path d="M8 14.2C4.4 11.4 1.8 9 1.8 6.1 1.8 4.3 3.2 3 5 3c1.1 0 2.2.6 3 1.7C8.8 3.6 9.9 3 11 3c1.8 0 3.2 1.3 3.2 3.1 0 2.9-2.6 5.3-6.2 8.1z"/></svg>',
  comment:'<svg viewBox="0 0 16 16"><path d="M2.2 3.2h11.6c.6 0 1 .5 1 1v5.8c0 .6-.4 1-1 1H6.6L3 13.6v-2.6H2.2c-.6 0-1-.4-1-1V4.2c0-.5.4-1 1-1z"/></svg>',
  view:'<svg viewBox="0 0 16 16"><path d="M5.4 3.3l7.2 4.7-7.2 4.7z"/></svg>'
};
function statIcon(t,v){return '<span class="cstat">'+STAT_ICONS[t]+esc(String(v))+'</span>';}
function adThumb(a){
  var plat=(a.platforms&&a.platforms[0])?prettyPlat(a.platforms[0]):'Meta';
  var tl=isRecent(a.started)?'<span class="nw">New</span>':(a.hasVideo?'<span class="nw vid">▶ Video</span>':'');
  return postCard({link:a.link,image:a.image||'',tl:tl,tr:plat,cap:String(a.text||a.title||'')});
}
function adsHTML(d){
  if(!d||d.error||!d.ads||!d.ads.length)return '<div class="adsempty">No active ads found in the Meta Ad Library right now.</div>';
  var plats=(d.platforms||[]).map(prettyPlat).join(' · ');
  var sum='<div class="adssum"><b>'+d.active+' active ad'+(d.active===1?'':'s')+'</b>'+(d.newest?' · newest '+fmtDate(d.newest):'')+(plats?' · '+plats:'')+'</div>';
  return sum+'<div class="adstrip">'+d.ads.map(adThumb).join('')+'</div>';
}
function loadAds(box){
  var brand=box.getAttribute('data-brand'),country=box.getAttribute('data-country')||'ALL';
  if(state.day){
    var sa=(viewSnap&&viewSnap.ads)||{ads:[]};
    var fa=(sa.ads||[]).filter(function(a){return String(a.started||'').slice(0,10)===state.day;});
    box.innerHTML=fa.length?adsHTML({ads:fa,active:fa.length,platforms:sa.platforms||[],newest:state.day,country:sa.country}):'<div class="adsempty">No new ads detected on this date.</div>';
    return;
  }
  fetch(API+'/api/ads?brand='+encodeURIComponent(brand)+'&country='+encodeURIComponent(country))
    .then(function(r){return r.json();})
    .then(function(d){
      box.innerHTML=adsHTML(d);
      if(d&&d.ads&&d.ads.length){var s=box.closest('.chan').querySelector('.chan-sum');if(s)s.innerHTML='<b style="color:var(--text);font-weight:600">'+d.active+'</b> active ad'+(d.active===1?'':'s')+' · <span class="flag">Meta Ad Library</span>';}
    })
    .catch(function(){box.innerHTML='<div class="adsempty">Couldn’t reach the ad service just now — try again in a moment.</div>';});
}
function fmtNum(n){n=+n||0;return n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,'')+'M':(n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,'')+'k':''+n);}
function socSummary(posts){if(!posts.length)return null;var hv=posts.some(function(p){return p.views!=null;}),metric=hv?'views':'likes';var top=posts.reduce(function(m,p){var v=(metric==='views'?p.views:p.likes)||0;return v>m?v:m;},0);return {count:posts.length,metric:metric,topValue:top};}
function socThumb(p){
  var st=[];
  if(p.views!=null&&p.views>=0)st.push(statIcon('view',fmtNum(p.views)));
  if(p.likes!=null&&p.likes>=0)st.push(statIcon('like',fmtNum(p.likes)));
  if(p.comments!=null&&p.comments>=0)st.push(statIcon('comment',fmtNum(p.comments)));
  var tl=p.kind?'<span class="nw alt">'+esc(p.kind)+'</span>':'';

/* ── best-effort live refresh (graceful: keeps captured data if it can't fetch) ── */
function summarize(products){
  var min=Infinity,max=0,onSale=0;
  products.forEach(function(p){(p.variants||[]).forEach(function(v){
    var price=parseFloat(v.price); if(!isNaN(price)){if(price<min)min=price;if(price>max)max=price;}
    var cap=parseFloat(v.compare_at_price); if(!isNaN(cap)&&cap>price)onSale++;
  });});
  return {products:products.length,onSale:onSale,min:(min===Infinity?0:min),max:max};
}
function tryFetch(u){
  return new Promise(function(res){
    var done=false,to=setTimeout(function(){if(!done){done=true;res(null);}},9000);
    fetch(u).then(function(r){return (r&&r.ok)?r.json():null;}).then(function(j){
      if(done)return;done=true;clearTimeout(to);res((j&&j.products&&j.products.length)?j.products:null);
    }).catch(function(){if(done)return;done=true;clearTimeout(to);res(null);});
  });
}
function refreshLive(c){
  var path=c.host+'/products.json?limit=250';
  var urls=['https://'+path,'https://corsproxy.io/?url='+encodeURIComponent('https://'+path),'https://api.allorigins.win/raw?url='+encodeURIComponent('https://'+path)];
  return urls.reduce(function(chain,u){return chain.then(function(prev){return prev?prev:tryFetch(u);});},Promise.resolve(null))
    .then(function(products){return products?summarize(products):null;});
}
function applyLive(c,s){

    if(d>=2)diff=' · ↑'+d+' more on sale';
    else if(d<=-2)diff=' · ↓'+Math.abs(d)+' fewer on sale';
  }
  el.innerHTML=' · <span style="color:var(--quiet)">re-checked live just now'+diff+'</span>';
}
function ensureLive(c){
  if(!c||!c.live)return;
  if(liveCache.hasOwnProperty(c.id)){applyLive(c,liveCache[c.id]);return;}
  refreshLive(c).then(function(s){liveCache[c.id]=s;applyLive(c,s);});
}

  if(!list.length){
    document.getElementById('railList').innerHTML='';
    document.getElementById('detail').innerHTML='<div class="empty"><div class="ei"><svg width="22" height="22" viewBox="0 0 16 16" fill="none" stroke="#3f9d9b" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><path d="M8 15V4.5"/><path d="M8 9.5C5.4 9.2 3.8 7.4 4.1 4.7 6.7 5 8.2 6.8 8 9.5Z"/><path d="M8 7.2C10.4 6.9 11.8 5.2 11.6 2.9 9.3 3.2 7.9 4.9 8 7.2Z"/></svg></div><h3>Your watchlist is empty</h3><p>Add the first brand you want to keep an eye on.</p><button class="btn btn-p" onclick="openModal()">Add to Watchlist</button></div>';
    setDate();return;
  }
  if(!state.sel||!list.some(function(c){return c.id===state.sel;}))state.sel=list[0].id;
  document.getElementById('railList').innerHTML=list.map(railRow).join('');
  var cur=list.find(function(c){return c.id===state.sel;});
  document.getElementById('detail').innerHTML=report(cur);
  ensureLive(cur);
  ensureHist(cur);
  refreshDateFloat();
  setDate();
  syncChat(cur);
}
function setDate(){var d=new Date(),days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('topDate').textContent=days[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+' '+mo[d.getMonth()]+' '+d.getFullYear();}
function select(id){state.sel=id;state.day=null;viewSnap=null;document.getElementById('app').dataset.view='detail';render();document.getElementById('detail').scrollTop=0;}
function back(){document.getElementById('app').dataset.view='list';}

function openModal(){document.getElementById('ov').classList.add('open');setTimeout(function(){document.getElementById('fN').focus();},40);}
function closeModal(){document.getElementById('ov').classList.remove('open');document.getElementById('eN').style.display='none';document.getElementById('eU').style.display='none';document.getElementById('fN').value='';document.getElementById('fU').value='';}
function normUrl(v){v=(v||'').trim();if(!v)return null;if(!/^https?:\/\//i.test(v))v='https://'+v;try{var u=new URL(v);if(!u.hostname.includes('.'))return null;return u;}catch(e){return null;}}
function submitComp(){
  var n=document.getElementById('fN').value.trim(),u=normUrl(document.getElementById('fU').value),ok=true;
  document.getElementById('eN').style.display=n?'none':'block';if(!n)ok=false;
  document.getElementById('eU').style.display=u?'none':'block';if(!u)ok=false;
  if(!ok)return;
  var l=getList();l.unshift({id:'c-'+Date.now(),demo:false,name:n,host:u.hostname.replace(/^www\./,''),url:u.href,updatedAt:Date.now()});
  save(l);state.sel=l[0].id;closeModal();document.getElementById('app').dataset.view='detail';render();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeChat();}if(e.key==='Enter'&&document.getElementById('ov').classList.contains('open'))submitComp();});

/* ── AI chat (answers grounded in the captured data) ── */
var chatThreads={};
var CHAT_CHIPS=['When did they launch their current sale?','What offer are they pushing hardest?','How often do they email — and about what?','What angle do their top posts use?'];
function currentComp(){var l=getList();return l.find(function(c){return c.id===state.sel;})||l[0];}
function chatCtx(c){var p=[];if(c.oneLiner)p.push(c.oneLiner);if(c.verdict)p.push(c.verdict);var w=c.channels&&c.channels.website;if(w){if(w.stats)p.push('Website: '+w.stats);if(w.changes)w.changes.forEach(function(d){p.push('• '+d.s+': '+String(d.d).replace(/<[^>]+>/g,''));});}return p.join(' · ');}
function openChat(){var c=currentComp();if(!c)return;document.getElementById('chatSub').textContent='about '+c.name;document.getElementById('chatPanel').classList.add('open');renderChat(c);setTimeout(function(){document.getElementById('chatInput').focus();},150);}
function closeChat(){var p=document.getElementById('chatPanel');if(p)p.classList.remove('open');}
function syncChat(c){var p=document.getElementById('chatPanel');if(c&&p&&p.classList.contains('open')){document.getElementById('chatSub').textContent='about '+c.name;renderChat(c);}}
function renderChat(c){
  var box=document.getElementById('chatMsgs'),thread=chatThreads[c.id]||[];
  box.innerHTML='';
  if(!thread.length){var s=document.createElement('div');s.className='cmsg sys';s.textContent='Ask me anything about '+c.name+' — I answer from their real ads, posts and emails we’ve captured.';box.appendChild(s);}
  else{thread.forEach(function(m){var d=document.createElement('div');d.className='cmsg '+(m.role==='assistant'?'ai':'user');d.textContent=m.content;box.appendChild(d);});}
  document.getElementById('chatChips').innerHTML=thread.length?'':CHAT_CHIPS.map(function(q){return '<button class="cchip" onclick="askChip(this)">'+esc(q)+'</button>';}).join('');
  box.scrollTop=box.scrollHeight;
}
function askChip(b){document.getElementById('chatInput').value=b.textContent;sendChat();}
function sendChat(){
  var c=currentComp();if(!c)return;
  var inp=document.getElementById('chatInput'),q=(inp.value||'').trim();if(!q)return;
  inp.value='';document.getElementById('chatChips').innerHTML='';
  var box=document.getElementById('chatMsgs'),sys=box.querySelector('.cmsg.sys');if(sys)sys.remove();
  var um=document.createElement('div');um.className='cmsg user';um.textContent=q;box.appendChild(um);
  var thread=chatThreads[c.id]||(chatThreads[c.id]=[]),hist=thread.slice();thread.push({role:'user',content:q});
  var typ=document.createElement('div');typ.className='ctyping';typ.innerHTML='<span class="spin"></span> IntelAI is reading the data…';box.appendChild(typ);box.scrollTop=box.scrollHeight;
  fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:c.name,host:c.host||'',country:c.country||'ALL',handles:c.handles||{},context:chatCtx(c),question:q,messages:hist})})
    .then(function(r){return r.json();}).then(function(d){
      typ.remove();var am=document.createElement('div');am.className='cmsg ai';am.textContent=(d&&d.error)?('⚠ '+d.error):((d&&d.answer)||'(no answer)');box.appendChild(am);box.scrollTop=box.scrollHeight;
      if(d&&!d.error&&d.answer)thread.push({role:'assistant',content:d.answer});
    }).catch(function(){typ.remove();var am=document.createElement('div');am.className='cmsg ai';am.textContent='Couldn’t reach the AI just now — try again in a moment.';box.appendChild(am);box.scrollTop=box.scrollHeight;});
}

render();
</script>
</body>
